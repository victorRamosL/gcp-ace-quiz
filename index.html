<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCP Associate Cloud Engineer Practice Exam - Extended</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #272822;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .container {
            max-width: 1200px;
            width: 95%;
            margin: 0 auto;
            background: #3e3d32;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #3e3d32 0%, #272822 100%);
            color: #f8f8f2;
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid #75715e;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: #75715e;
            height: 8px;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: #a6e22e;
            height: 100%;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #272822;
            border-bottom: 2px solid #75715e;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #66d9ef;
        }

        .stat-label {
            font-size: 12px;
            color: #75715e;
            text-transform: uppercase;
        }

        .content {
            padding: 40px 60px;
        }

        .question-card {
            margin-bottom: 30px;
        }

        .question-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            background: #ae81ff;
            color: #f8f8f2;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .section-badge {
            background: #272822;
            color: #66d9ef;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #f8f8f2;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            border: 2px solid #75715e;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            background: #272822;
        }

        .option:hover {
            border-color: #66d9ef;
            background: #49483e;
        }

        .option.selected {
            border-color: #66d9ef;
            background: #49483e;
        }

        .option.correct {
            border-color: #a6e22e;
            background: #2a3a1e;
        }

        .option.incorrect {
            border-color: #f92672;
            background: #3a1a2a;
        }

        .option.correct-answer {
            border-color: #a6e22e;
            background: #2a3a1e;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #75715e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
            color: #f8f8f2;
        }

        .option.selected .option-letter {
            background: #66d9ef;
            color: #272822;
        }

        .option.correct .option-letter,
        .option.correct-answer .option-letter {
            background: #a6e22e;
            color: #272822;
        }

        .option.incorrect .option-letter {
            background: #f92672;
            color: #f8f8f2;
        }

        .option-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.5;
            color: #f8f8f2;
        }

        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #2a3a1e;
            border: 2px solid #a6e22e;
        }

        .feedback.incorrect {
            background: #3a1a2a;
            border: 2px solid #f92672;
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback.correct .feedback-title {
            color: #a6e22e;
        }

        .feedback.incorrect .feedback-title {
            color: #f92672;
        }

        .feedback-text {
            color: #f8f8f2;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #75715e;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #66d9ef;
            color: #272822;
        }

        .btn-primary:hover {
            background: #a1e8f8;
        }

        .btn-primary:disabled {
            background: #75715e;
            color: #3e3d32;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #49483e;
            color: #f8f8f2;
        }

        .btn-secondary:hover {
            background: #75715e;
        }

        .btn-success {
            background: #a6e22e;
            color: #272822;
        }

        .btn-success:hover {
            background: #b8f040;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #272822;
            border-top: 2px solid #75715e;
            color: #f8f8f2;
        }

        .results {
            background: #3e3d32;
            border-radius: 12px;
            padding: 30px;
            margin: 30px;
            text-align: center;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            color: #f8f8f2;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ae81ff 0%, #a6e22e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            color: #272822;
        }

        .score-percentage {
            font-size: 48px;
            font-weight: bold;
        }

        .score-text {
            font-size: 14px;
        }

        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-item {
            padding: 20px;
            background: #272822;
            border-radius: 12px;
        }

        .result-item-value {
            font-size: 32px;
            font-weight: bold;
            color: #fd971f;
        }

        .result-item-label {
            color: #75715e;
            margin-top: 5px;
        }

        .question-grid-toggle {
            display: flex;
            justify-content: center;
            padding: 10px 30px;
            background: #272822;
        }

        .question-grid-toggle button {
            padding: 8px 16px;
            border: 2px solid #ae81ff;
            border-radius: 8px;
            background: #3e3d32;
            color: #ae81ff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .question-grid-toggle button:hover,
        .question-grid-toggle button.active {
            background: #ae81ff;
            color: #272822;
        }

        .question-grid-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .question-grid-overlay.show {
            display: flex;
        }

        .question-grid-panel {
            background: #3e3d32;
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .question-grid-panel h3 {
            margin-bottom: 8px;
            color: #f8f8f2;
        }

        .grid-legend {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #75715e;
        }

        .grid-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .grid-legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            display: inline-block;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 6px;
        }

        .grid-cell {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid transparent;
        }

        .grid-cell:hover {
            transform: scale(1.15);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .grid-cell.current {
            border-color: #f8f8f2;
        }

        .grid-cell.unanswered {
            background: #e6db74;
            color: #272822;
        }

        .grid-cell.correct {
            background: #a6e22e;
            color: #272822;
        }

        .grid-cell.incorrect {
            background: #f92672;
            color: #f8f8f2;
        }

        .shuffle-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 0 30px 10px;
            background: #272822;
        }

        .shuffle-controls button {
            padding: 8px 16px;
            border: 2px solid #fd971f;
            border-radius: 8px;
            background: #3e3d32;
            color: #fd971f;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .shuffle-controls button:hover {
            background: #fd971f;
            color: #272822;
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }

            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .option-text {
                font-size: 14px;
            }

            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 GCP Associate Cloud Engineer Practice Exam</h1>
            <p>253 Questions - Extended Edition</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="currentQuestion">1</div>
                <div class="stat-label">Current</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="answeredCount">0</div>
                <div class="stat-label">Answered</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="correctCount">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="scorePercent">0%</div>
                <div class="stat-label">Score</div>
            </div>
        </div>

        <div class="question-grid-toggle">
            <button onclick="toggleGrid()">Question Map</button>
        </div>
        <div class="shuffle-controls">
            <button onclick="shuffleQuestions()">Shuffle Questions</button>
        </div>

        <div class="question-grid-overlay" id="gridOverlay" onclick="closeGridFromOverlay(event)">
            <div class="question-grid-panel">
                <h3>Question Map</h3>
                <div class="grid-legend">
                    <span><span class="grid-legend-dot" style="background:#e6db74"></span> Not answered</span>
                    <span><span class="grid-legend-dot" style="background:#a6e22e"></span> Correct</span>
                    <span><span class="grid-legend-dot" style="background:#f92672"></span> Incorrect</span>
                </div>
                <div class="question-grid" id="questionGrid"></div>
            </div>
        </div>

        <div class="content" id="questionContent">
            <!-- Questions will be inserted here -->
        </div>

        <div class="navigation">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Previous</button>
            <div>
                <span id="questionNav"></span>
            </div>
            <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()">Next →</button>
        </div>

        <div class="results" id="results">
            <!-- Results will be shown here -->
        </div>
    </div>

    <script>
        const questions = [
            // Original 50 questions from first quiz
            {
                section: "Section 1",
                question: "Your company has multiple departments, each with its own GCP projects. The security team needs to enforce a policy that prevents all projects from enabling the Compute Engine API. What should you do?",
                options: [
                    "Create an IAM policy that denies the compute.googleapis.com API for all users",
                    "Create an organization policy constraint using constraints/serviceuser.services to deny compute.googleapis.com",
                    "Remove the Compute Engine API from each project's enabled APIs list",
                    "Create a custom role that excludes Compute Engine permissions and assign it to all users"
                ],
                correct: 1,
                explanation: "Organization policies are designed for enforcing constraints across projects. The constraints/serviceuser.services constraint can allow or deny specific APIs."
            },
            {
                section: "Section 1",
                question: "You need to grant a developer the ability to deploy applications to Compute Engine but prevent them from deleting instances. Which role should you assign?",
                options: [
                    "roles/compute.admin",
                    "roles/compute.instanceAdmin.v1",
                    "roles/compute.instanceAdmin",
                    "roles/editor"
                ],
                correct: 1,
                explanation: "roles/compute.instanceAdmin.v1 allows creating, modifying, and starting/stopping instances but NOT deleting them."
            },
            {
                section: "Section 1",
                question: "Your organization has the following resource hierarchy: Organization → Folder (Production) → Project A. You grant a user the Viewer role at the Folder level and the Editor role at the Project A level. What permissions does the user have in Project A?",
                options: [
                    "Viewer permissions only (least privilege)",
                    "Editor permissions (most permissive role wins)",
                    "Viewer + Editor combined",
                    "No permissions (conflicting roles)"
                ],
                correct: 1,
                explanation: "IAM permissions are inherited and cumulative. When multiple roles are granted at different levels, the union of all permissions applies. The most permissive permissions always apply."
            },
            {
                section: "Section 1",
                question: "You need to set up billing alerts when your project's monthly costs exceed $1000. What should you do?",
                options: [
                    "Create a Cloud Monitoring alert on the billing metrics",
                    "Create a billing budget set to $1000 with alert threshold rules",
                    "Set a quota limit of $1000 in the project settings",
                    "Create a Cloud Function triggered by billing exports to BigQuery"
                ],
                correct: 1,
                explanation: "Billing budgets allow you to set spending limits and configure alert thresholds (e.g., alert at 50%, 90%, 100% of budget)."
            },
            {
                section: "Section 1",
                question: "Which command enables the Cloud Storage API for your current project?",
                options: [
                    "gcloud services enable storage.googleapis.com",
                    "gcloud services enable storage-api.googleapis.com",
                    "gcloud services enable storage-component.googleapis.com",
                    "gcloud api enable storage.googleapis.com"
                ],
                correct: 2,
                explanation: "The correct API name for Cloud Storage is storage-component.googleapis.com."
            },
            {
                section: "Section 1",
                question: "Your team needs to manage users for your Google Cloud organization. Several users need access but don't have Google accounts. What should you do?",
                options: [
                    "Create Gmail accounts for each user",
                    "Use Cloud Identity to create managed accounts in your organization's domain",
                    "Create service accounts for each user",
                    "Use Firebase Authentication"
                ],
                correct: 1,
                explanation: "Cloud Identity provides identity management for organizations, allowing you to create and manage user accounts in your domain without requiring Gmail."
            },
            {
                section: "Section 1",
                question: "You need to grant a team access to create and manage VPCs across multiple projects in the 'Production' folder. What is the most efficient approach?",
                options: [
                    "Grant roles/compute.networkAdmin to each user at the organization level",
                    "Grant roles/compute.networkAdmin to a Google Group at the folder level",
                    "Grant roles/compute.networkAdmin to each user in each project",
                    "Create a custom role and assign it at the project level"
                ],
                correct: 1,
                explanation: "Granting roles to groups at the folder level is the most efficient and manageable approach."
            },
            {
                section: "Section 1",
                question: "You need to view all Compute Engine instances and Cloud Storage buckets across all projects in your organization. Which tool should you use?",
                options: [
                    "Cloud Console's project switcher to check each project",
                    "Cloud Asset Inventory to query resources across the organization",
                    "gcloud compute instances list --all-projects",
                    "Custom script using the Resource Manager API"
                ],
                correct: 1,
                explanation: "Cloud Asset Inventory provides a centralized view of all resources across the organization, with search and query capabilities."
            },
            {
                section: "Section 1",
                question: "You need to ensure all new projects created in your organization are automatically linked to the same billing account. What should you do?",
                options: [
                    "Create an organization policy that enforces the billing account",
                    "Set the default billing account at the organization level in Billing settings",
                    "Create a Cloud Function triggered on project creation to link the billing account",
                    "Manually link each project to the billing account when created"
                ],
                correct: 1,
                explanation: "You can set a default billing account at the organization or folder level, which automatically links to new projects created within that scope."
            },
            {
                section: "Section 1",
                question: "Your application logs show that API requests are failing with 'Quota exceeded' errors for Compute Engine. What should you do FIRST?",
                options: [
                    "Request a quota increase through the Cloud Console",
                    "Reduce the number of API calls in your application",
                    "Check current quota usage and limits in the Cloud Console",
                    "Enable the Compute Engine API again"
                ],
                correct: 2,
                explanation: "First, diagnose the problem by checking which specific quota is exceeded and current usage."
            },
            {
                section: "Section 1",
                question: "You need to export billing data to BigQuery for cost analysis. What should you configure?",
                options: [
                    "Cloud Logging sink to export billing logs to BigQuery",
                    "Billing export to BigQuery in the Billing account settings",
                    "Cloud Monitoring metrics export to BigQuery",
                    "Scheduled query in BigQuery to pull billing data"
                ],
                correct: 1,
                explanation: "Billing exports are configured directly in the Billing account settings."
            },
            {
                section: "Section 1",
                question: "You need to create a custom VPC with subnets in us-central1 and europe-west1. The subnets should use non-overlapping IP ranges that you specify. What VPC mode should you use?",
                options: [
                    "Auto mode VPC",
                    "Custom mode VPC",
                    "Default VPC",
                    "Legacy VPC"
                ],
                correct: 1,
                explanation: "Custom mode VPC allows you to manually specify subnet IP ranges and regions."
            },
            {
                section: "Section 2",
                question: "Your team needs to deploy a containerized application that automatically scales based on HTTP traffic and requires zero infrastructure management. Which compute option should you use?",
                options: [
                    "Compute Engine with an autoscaled managed instance group",
                    "Google Kubernetes Engine (GKE) Autopilot",
                    "Cloud Run",
                    "Cloud Run functions"
                ],
                correct: 2,
                explanation: "Cloud Run is fully managed (zero infrastructure management), automatically scales based on HTTP requests, and is designed for containerized applications."
            },
            {
                section: "Section 2",
                question: "You need to run a Kubernetes workload that requires specific node configurations and custom scaling logic. Your team has Kubernetes expertise. Which compute option is most appropriate?",
                options: [
                    "GKE Autopilot",
                    "GKE Standard",
                    "Cloud Run",
                    "Compute Engine with Kubernetes installed"
                ],
                correct: 1,
                explanation: "GKE Standard provides full control over node configuration, node pools, and scaling policies."
            },
            {
                section: "Section 2",
                question: "Your application experiences predictable traffic spikes during business hours (9 AM - 5 PM) but is idle at night. You want to minimize costs. Which Compute Engine feature should you use?",
                options: [
                    "Preemptible VMs",
                    "Spot VMs",
                    "Scheduled instance start/stop with Cloud Scheduler",
                    "Sole-tenant nodes"
                ],
                correct: 2,
                explanation: "Scheduled instance start/stop allows you to automatically shut down VMs when not needed and start them before business hours."
            },
            {
                section: "Section 2",
                question: "You need to store 500 TB of video files that are accessed once per year for compliance. Cost is the primary concern. Which storage solution should you use?",
                options: [
                    "Cloud Storage Standard class",
                    "Cloud Storage Nearline class",
                    "Cloud Storage Coldline class",
                    "Cloud Storage Archive class"
                ],
                correct: 3,
                explanation: "Archive class is the lowest-cost option designed for data accessed less than once per year."
            },
            {
                section: "Section 2",
                question: "Your application needs a relational database with automatic failover, point-in-time recovery, and support for PostgreSQL. The database size is ~200 GB. Which solution should you use?",
                options: [
                    "Cloud SQL for PostgreSQL with high availability enabled",
                    "Cloud Spanner",
                    "BigQuery",
                    "Firestore"
                ],
                correct: 0,
                explanation: "Cloud SQL for PostgreSQL provides a managed relational database with HA (automatic failover) and point-in-time recovery built-in."
            },
            {
                section: "Section 2",
                question: "You need to implement a solution where microservices communicate asynchronously. Services should receive messages at their own pace, and messages must not be lost if a service is down. What should you use?",
                options: [
                    "Cloud Load Balancing",
                    "Pub/Sub",
                    "Cloud Storage",
                    "Firestore"
                ],
                correct: 1,
                explanation: "Pub/Sub is designed for asynchronous messaging between services with at-least-once delivery guarantees."
            },
            {
                section: "Section 2",
                question: "Your application requires a NoSQL database that can handle millions of writes per second with single-digit millisecond latency. Data is time-series IoT sensor data. Which database should you use?",
                options: [
                    "Firestore",
                    "Cloud SQL",
                    "Bigtable",
                    "BigQuery"
                ],
                correct: 2,
                explanation: "Bigtable is optimized for high-throughput writes, low-latency reads, and time-series data."
            },
            {
                section: "Section 2",
                question: "You need to load 10 TB of CSV files from your on-premises data center into BigQuery. Which method is most efficient?",
                options: [
                    "Use bq load command for each file",
                    "Upload files to Cloud Storage, then load into BigQuery using bq load",
                    "Use Storage Transfer Service to transfer to Cloud Storage, then load into BigQuery",
                    "Stream records into BigQuery using the API"
                ],
                correct: 2,
                explanation: "Storage Transfer Service is designed for large-scale data transfers from on-premises."
            },
            {
                section: "Section 2",
                question: "You need to configure a load balancer to distribute HTTPS traffic to backends in multiple regions with automatic failover. What should you use?",
                options: [
                    "External Application Load Balancer (global)",
                    "External Network Load Balancer",
                    "Internal Application Load Balancer",
                    "Cloud CDN"
                ],
                correct: 0,
                explanation: "External Application Load Balancer is a global load balancer that supports HTTPS and multi-region distribution."
            },
            {
                section: "Section 2",
                question: "You need to connect your on-premises network to GCP with a dedicated, high-bandwidth (10 Gbps) connection. Which service should you use?",
                options: [
                    "Cloud VPN",
                    "Cloud Interconnect (Dedicated Interconnect)",
                    "VPC Peering",
                    "Cloud NAT"
                ],
                correct: 1,
                explanation: "Dedicated Interconnect provides a direct physical connection with high bandwidth (10 Gbps+)."
            },

                    "Create a Data Studio dashboard that uses the related BigQuery tables as a source and give the BI team view access to the Data Studio dashboard.",
                    "Create a Service Account for the BI team and distribute a new private key to each member of the BI team.",
                    "Use Cloud Scheduler to schedule a batch Dataflow job to copy the data from BigQuery to the BI team\'s internal data warehouse.",
                    "Assign the IAM role of BigQuery User to a Google Group that contains the members of the BI team.",
                ],
                correct: 3,
                explanation: "Assign the IAM role of BigQuery User to a Google Group that contains the members of the BI team."
            },
            {
                section: "Section 2",
                question: "Your company is moving its entire workload to Compute Engine. Some servers should be accessible through the Internet, and other servers should only be accessible over the internal network. All servers need to be able to talk to each other over specific ports and protocols. The current on-premises network relies on a demilitarized zone (DMZ) for the public servers and a Local Area Network (LAN) for the private servers. You need to design the networking infrastructure on Google Cloud to match these requirements. What should you do?",
                options: [
                    "1. Create a single VPC with a subnet for the DMZ and a subnet for the LAN. 2. Set up firewall rules to open up relevant traffic between the DMZ and the LAN subnets, and another firewall rule to allow public ingress traffic for the DMZ.",

                    "1. Create a VPC with a subnet for the DMZ and another VPC with a subnet for the LAN. 2. Set up firewall rules to open up relevant traffic between the DMZ and the LAN subnets, and another firewall rule to allow public egress traffic for the DMZ.",
                ],
                correct: 0,
                explanation: "1. Create a single VPC with a subnet for the DMZ and a subnet for the LAN. 2. Set up firewall rules ..."
            }

        ];

        let currentQuestionIndex = 0;
        let userAnswers = {};
        let checkedQuestions = new Set();

        function isCorrect(questionIndex) {
            const question = questions[questionIndex];
            const answer = userAnswers[questionIndex];
            if (question.multiSelect) {
                if (!Array.isArray(answer)) return false;
                const correct = question.correct.slice().sort();
                const user = answer.slice().sort();
                return correct.length === user.length && correct.every((v, i) => v === user[i]);
            }
            return answer === question.correct;
        }

        function isOptionCorrect(question, index) {
            if (question.multiSelect) return question.correct.includes(index);
            return index === question.correct;
        }

        function isOptionSelected(userAnswer, index, isMulti) {
            if (isMulti) return Array.isArray(userAnswer) && userAnswer.includes(index);
            return userAnswer === index;
        }

        function hasAnswer(questionIndex) {
            const question = questions[questionIndex];
            const answer = userAnswers[questionIndex];
            if (answer === undefined) return false;
            if (question.multiSelect) return Array.isArray(answer) && answer.length === question.correct.length;
            return true;
        }

        function renderQuestion() {
            const question = questions[currentQuestionIndex];
            const isChecked = checkedQuestions.has(currentQuestionIndex);
            const userAnswer = userAnswers[currentQuestionIndex];
            const isMulti = question.multiSelect;
            const requiredCount = isMulti ? question.correct.length : 1;
            const selectedCount = isMulti && Array.isArray(userAnswer) ? userAnswer.length : 0;
            const answeredFully = hasAnswer(currentQuestionIndex);
            const gotItRight = isChecked && isCorrect(currentQuestionIndex);

            const html = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-number">${currentQuestionIndex + 1}</div>
                        ${isMulti ? '<div class="section-badge" style="background:#49483e;color:#fd971f;">Select ' + requiredCount + '</div>' : ''}
                        <div class="section-badge">${question.section}</div>
                    </div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">
                        ${question.options.map((option, index) => {
                            let optionClass = 'option';
                            if (isOptionSelected(userAnswer, index, isMulti)) optionClass += ' selected';
                            if (isChecked) {
                                if (isOptionCorrect(question, index)) {
                                    optionClass += ' correct-answer';
                                } else if (isOptionSelected(userAnswer, index, isMulti) && !isOptionCorrect(question, index)) {
                                    optionClass += ' incorrect';
                                }
                            }
                            return `
                                <div class="${optionClass}" onclick="selectOption(${index})">
                                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                                    <div class="option-text">${option}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    ${isMulti && !isChecked ? '<div style="color:#75715e;font-size:13px;margin-top:8px;">' + selectedCount + '/' + requiredCount + ' selected</div>' : ''}
                    <div class="feedback ${isChecked ? 'show' : ''} ${gotItRight ? 'correct' : 'incorrect'}">
                        <div class="feedback-title">
                            ${gotItRight ? '✓ Correct!' : '✗ Incorrect'}
                        </div>
                        <div class="feedback-text">
                            <strong>Explanation:</strong> ${question.explanation}
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn btn-primary" onclick="checkAnswer()" ${!answeredFully || isChecked ? 'disabled' : ''}>
                            Check Answer
                        </button>
                        ${isChecked ? `
                            <button class="btn btn-success" onclick="nextQuestion()">
                                Next Question →
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;

            document.getElementById('questionContent').innerHTML = html;
            updateNavigation();
            updateStats();
        }

        function selectOption(index) {
            if (checkedQuestions.has(currentQuestionIndex)) return;
            const question = questions[currentQuestionIndex];
            if (question.multiSelect) {
                let current = userAnswers[currentQuestionIndex] || [];
                if (!Array.isArray(current)) current = [];
                if (current.includes(index)) {
                    current = current.filter(i => i !== index);
                } else {
                    if (current.length < question.correct.length) {
                        current = [...current, index];
                    } else {
                        current = [...current.slice(1), index];
                    }
                }
                userAnswers[currentQuestionIndex] = current;
            } else {
                userAnswers[currentQuestionIndex] = index;
            }
            renderQuestion();
        }

        function checkAnswer() {
            if (hasAnswer(currentQuestionIndex)) {
                checkedQuestions.add(currentQuestionIndex);
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === questions.length - 1;
            document.getElementById('questionNav').textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
        }

        function updateStats() {
            const answeredCount = Object.keys(userAnswers).length;
            const correctCount = Object.keys(userAnswers).filter(key => {
                return checkedQuestions.has(parseInt(key)) && isCorrect(parseInt(key));
            }).length;
            const scorePercent = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('answeredCount').textContent = answeredCount;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('scorePercent').textContent = scorePercent + '%';

            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            const totalQuestions = questions.length;
            const answeredCount = Object.keys(userAnswers).length;
            const correctCount = Object.keys(userAnswers).filter(key => {
                return checkedQuestions.has(parseInt(key)) && isCorrect(parseInt(key));
            }).length;
            const incorrectCount = answeredCount - correctCount;
            const unansweredCount = totalQuestions - answeredCount;
            const scorePercent = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

            const passStatus = scorePercent >= 75 ? 'PASS' : 'REVIEW NEEDED';
            const passColor = scorePercent >= 75 ? '#a6e22e' : '#f92672';

            const resultsHtml = `
                <h2>Exam Results</h2>
                <div class="score-circle" style="background: linear-gradient(135deg, ${passColor} 0%, #ae81ff 100%);">
                    <div class="score-percentage">${scorePercent}%</div>
                    <div class="score-text">${passStatus}</div>
                </div>
                <div class="results-details">
                    <div class="result-item">
                        <div class="result-item-value">${correctCount}</div>
                        <div class="result-item-label">Correct</div>
                    </div>
                    <div class="result-item">
                        <div class="result-item-value">${incorrectCount}</div>
                        <div class="result-item-label">Incorrect</div>
                    </div>
                    <div class="result-item">
                        <div class="result-item-value">${unansweredCount}</div>
                        <div class="result-item-label">Unanswered</div>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" onclick="resetQuiz()">Start Over</button>
                    <button class="btn btn-secondary" onclick="reviewAnswers()">Review Answers</button>
                </div>
            `;

            document.getElementById('questionContent').style.display = 'none';
            document.querySelector('.navigation').style.display = 'none';
            document.getElementById('results').innerHTML = resultsHtml;
            document.getElementById('results').classList.add('show');
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            userAnswers = {};
            checkedQuestions = new Set();
            document.getElementById('questionContent').style.display = 'block';
            document.querySelector('.navigation').style.display = 'flex';
            document.getElementById('results').classList.remove('show');
            renderQuestion();
        }

        function reviewAnswers() {
            currentQuestionIndex = 0;
            document.getElementById('questionContent').style.display = 'block';
            document.querySelector('.navigation').style.display = 'flex';
            document.getElementById('results').classList.remove('show');
            renderQuestion();
        }

        function shuffleQuestions() {
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            currentQuestionIndex = 0;
            userAnswers = {};
            checkedQuestions = new Set();
            renderQuestion();
        }

        function toggleGrid() {
            const overlay = document.getElementById('gridOverlay');
            overlay.classList.toggle('show');
            if (overlay.classList.contains('show')) {
                renderGrid();
            }
        }

        function closeGridFromOverlay(event) {
            if (event.target === document.getElementById('gridOverlay')) {
                document.getElementById('gridOverlay').classList.remove('show');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('questionGrid');
            let html = '';
            for (let i = 0; i < questions.length; i++) {
                let cellClass = 'grid-cell unanswered';
                if (checkedQuestions.has(i)) {
                    cellClass = isCorrect(i) ? 'grid-cell correct' : 'grid-cell incorrect';
                }
                if (i === currentQuestionIndex) cellClass += ' current';
                html += `<div class="${cellClass}" onclick="jumpToQuestion(${i})">${i + 1}</div>`;
            }
            grid.innerHTML = html;
        }

        function jumpToQuestion(index) {
            currentQuestionIndex = index;
            document.getElementById('gridOverlay').classList.remove('show');
            document.getElementById('questionContent').style.display = 'block';
            document.querySelector('.navigation').style.display = 'flex';
            document.getElementById('results').classList.remove('show');
            renderQuestion();
        }

        // Initialize - shuffle on load for random order each time
        shuffleQuestions();
    </script>
</body>
